wind, AssertUnwindSafe};\n\n    fn setup_contract() -\u003e (Env, Address, Address, Address, Address) {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n        let third_party = Address::generate(\u0026env);\n        (env, addr, admin, vault, third_party)\n    }\n\n    fn panic_message(err: std::boxed::Box\u003cdyn Any + Send\u003e) -\u003e std::string::String {\n        if let Some(message) = err.downcast_ref::\u003c\u0026str\u003e() {\n            std::string::String::from(*message)\n        } else if let Some(message) = err.downcast_ref::\u003cstd::string::String\u003e() {\n            message.clone()\n        } else {\n            std::string::String::from(\"\u003cnon-string panic payload\u003e\")\n        }\n    }\n\n    #[test]\n    fn test_settlement_initialization() {\n        let env = Env::default();\n        env.mock_all_auths();\n        env.ledger().set_timestamp(1_700_000_000);\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n\n        client.init(\u0026admin, \u0026vault);\n\n        env.as_contract(\u0026addr, || {\n            let inst = env.storage().instance();\n            assert!(inst.has(\u0026Symbol::new(\u0026env, \"admin\")));\n            assert!(inst.has(\u0026Symbol::new(\u0026env, \"vault\")));\n            assert!(inst.has(\u0026Symbol::new(\u0026env, \"developer_balances\")));\n            assert!(inst.has(\u0026Symbol::new(\u0026env, \"global_pool\")));\n            let balances: Map\u003cAddress, i128\u003e =\n                inst.get(\u0026Symbol::new(\u0026env, \"developer_balances\")).unwrap();\n\n            assert_eq!(balances.len(), 0);\n        });\n\n        assert_eq!(client.get_admin(), admin);\n        assert_eq!(client.get_vault(), vault);\n\n        let global_pool = client.get_global_pool();\n        assert_eq!(global_pool.total_balance, 0);\n        assert_eq!(global_pool.last_updated, 1_700_000_000);\n\n        let all_balances = client.get_all_developer_balances();\n        assert_eq!(all_balances.len(), 0);\n        assert_eq!(client.get_developer_balance(\u0026developer), 0);\n    }\n\n    #[test]\n    fn test_receive_payment_to_pool() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u00261000i128, \u0026true, \u0026None);\n\n        let global_pool = client.get_global_pool();\n        assert_eq!(global_pool.total_balance, 1000i128);\n    }\n\n    #[test]\n    fn test_receive_payment_to_developer() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u0026500i128, \u0026false, \u0026Some(developer.clone()));\n\n        assert_eq!(client.get_developer_balance(\u0026developer), 500i128);\n        assert_eq!(client.get_global_pool().total_balance, 0);\n    }\n\n    #[test]\n    fn test_receive_multiple_payments_accumulate() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u0026100i128, \u0026false, \u0026Some(developer.clone()));\n        client.receive_payment(\u0026vault, \u0026150i128, \u0026false, \u0026Some(developer.clone()));\n\n        assert_eq!(client.get_developer_balance(\u0026developer), 250i128);\n    }\n\n    #[test]\n    fn test_get_developer_balance_when_empty() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        let balance = client.get_developer_balance(\u0026developer);\n        assert_eq!(balance, 0);\n    }\n\n    #[test]\n    fn test_get_all_developer_balances_when_empty() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        let all = client.get_all_developer_balances();\n        assert_eq!(all.len(), 0);\n    }\n\n    #[test]\n    fn test_admin_can_receive_payment_to_pool() {\n        // Admin can route payments directly to global pool (not just via vault)\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n        client.receive_payment(\u0026admin, \u0026100i128, \u0026true, \u0026None);\n    }\n\n    #[test]\n    fn test_admin_can_receive_payment_to_developer() {\n        // Admin routing a payment directly to a developer (not via vault)\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026admin, \u0026200i128, \u0026false, \u0026Some(developer.clone()));\n\n        assert_eq!(client.get_developer_balance(\u0026developer), 200i128);\n    }\n\n    #[test]\n    fn test_pool_accumulates_across_multiple_payments() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u0026400i128, \u0026true, \u0026None);\n        client.receive_payment(\u0026vault, \u0026600i128, \u0026true, \u0026None);\n\n        assert_eq!(client.get_global_pool().total_balance, 1000i128);\n    }\n\n    #[test]\n    fn test_get_developer_balance_returns_zero_for_unknown() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let stranger = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        assert_eq!(client.get_developer_balance(\u0026stranger), 0i128);\n    }\n\n    #[test]\n    fn test_get_all_developer_balances() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let dev1 = Address::generate(\u0026env);\n        let dev2 = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u0026300i128, \u0026false, \u0026Some(dev1.clone()));\n        client.receive_payment(\u0026vault, \u0026200i128, \u0026false, \u0026Some(dev2.clone()));\n\n        let all = client.get_all_developer_balances();\n        assert_eq!(all.len(), 2);\n    }\n\n    #[test]\n    fn test_get_all_developer_balances_empty() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        let all = client.get_all_developer_balances();\n        assert_eq!(all.len(), 0);\n    }\n\n    #[test]\n    fn test_set_admin_two_step() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.set_admin(\u0026admin, \u0026new_admin);\n        assert_eq!(client.get_admin(), admin); // Still old admin\n\n        client.accept_admin();\n        assert_eq!(client.get_admin(), new_admin);\n    }\n\n    #[test]\n    #[should_panic(expected = \"no admin transfer pending\")]\n    fn test_accept_admin_fails_if_not_nominated() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.accept_admin();\n    }\n\n    #[test]\n    #[should_panic(expected = \"unauthorized: caller is not admin\")]\n    fn test_set_admin_unauthorized() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        // Third party cannot set admin\n        client.set_admin(\u0026vault, \u0026new_admin);\n    }\n\n    #[test]\n    #[should_panic(expected = \"unauthorized: caller is not admin\")]\n    fn test_set_vault_unauthorized() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        let attacker = Address::generate(\u0026env);\n        client.set_vault(\u0026attacker, \u0026new_vault);\n    }\n\n    #[test]\n    fn test_set_vault() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.set_vault(\u0026admin, \u0026new_vault);\n        assert_eq!(client.get_vault(), new_vault);\n    }\n\n    // â”€â”€ admin rotation edge cases â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€\n\n    #[test]\n    fn test_set_admin_to_same_address_succeeds() {\n        // Admin can nominate themselves again (useful for re-confirming control)\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.set_admin(\u0026admin, \u0026admin);\n        // Still current admin until accept\n        assert_eq!(client.get_admin(), admin);\n\n        client.accept_admin();\n        assert_eq!(client.get_admin(), admin);\n    }\n\n    #[test]\n    fn test_set_vault_to_same_address_succeeds() {\n        // Admin can update vault to same address (no-op but valid)\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.set_vault(\u0026admin, \u0026vault);\n        assert_eq!(client.get_vault(), vault);\n    }\n\n    #[test]\n    fn test_rapid_consecutive_admin_updates() {\n        // Admin can change nomination before acceptance\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_admin1 = Address::generate(\u0026env);\n        let new_admin2 = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        // First nomination\n        client.set_admin(\u0026admin, \u0026new_admin1);\n        // Change nomination before acceptance\n        client.set_admin(\u0026admin, \u0026new_admin2);\n        // Only second nominee can accept\n        client.accept_admin();\n        assert_eq!(client.get_admin(), new_admin2);\n    }\n\n    #[test]\n    fn test_admin_cannot_accept_own_nomination() {\n        // Current admin cannot bypass two-step process\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.set_admin(\u0026admin, \u0026admin);\n        // Admin must still accept to complete transfer\n        client.accept_admin();\n        assert_eq!(client.get_admin(), admin);\n    }\n\n    #[test]\n    #[should_panic(expected = \"unauthorized: caller is not admin\")]\n    fn test_pending_admin_cannot_set_admin() {\n        // Pending admin has no privileges until accepted\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.set_admin(\u0026admin, \u0026new_admin);\n        // New admin tries to set another admin before accepting\n        client.set_admin(\u0026new_admin, \u0026vault);\n    }\n\n    #[test]\n    fn test_vault_update_after_admin_rotation() {\n        // Ensure vault updates work correctly after admin change\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let new_vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        // Rotate admin\n        client.set_admin(\u0026admin, \u0026new_admin);\n        client.accept_admin();\n\n        // New admin updates vault\n        client.set_vault(\u0026new_admin, \u0026new_vault);\n        assert_eq!(client.get_vault(), new_vault);\n        assert_eq!(client.get_admin(), new_admin);\n    }\n\n    #[test]\n    fn test_admin_rotation_preserves_state() {\n        // Admin rotation doesn't affect pool or balances\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        // Add some balance\n        client.receive_payment(\u0026vault, \u00261000i128, \u0026false, \u0026Some(developer.clone()));\n        let dev_balance_before = client.get_developer_balance(\u0026developer);\n        let pool_before = client.get_global_pool();\n\n        // Rotate admin\n        client.set_admin(\u0026admin, \u0026new_admin);\n        client.accept_admin();\n\n        // State preserved\n        assert_eq!(client.get_developer_balance(\u0026developer), dev_balance_before);\n        assert_eq!(\n            client.get_global_pool().total_balance,\n            pool_before.total_balance\n        );\n    }\n\n    // â”€â”€ event emission tests â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€\n\n    #[test]\n    fn test_set_admin_emits_nomination_event() {\n        use soroban_sdk::testutils::Events as _;\n        use soroban_sdk::{IntoVal, Symbol};\n\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.set_admin(\u0026admin, \u0026new_admin);\n\n        let events = env.events().all();\n        let nom_ev = events\n            .iter()\n            .find(|e| {\n                !e.1.is_empty() \u0026\u0026 {\n                    let t: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n                    t == Symbol::new(\u0026env, \"admin_nominated\")\n                }\n            })\n            .expect(\"expected admin_nominated event\");\n\n        let topic_current: Address = nom_ev.1.get(1).unwrap().into_val(\u0026env);\n        let topic_new: Address = nom_ev.1.get(2).unwrap().into_val(\u0026env);\n        assert_eq!(topic_current, admin);\n        assert_eq!(topic_new, new_admin);\n    }\n\n    #[test]\n    fn test_accept_admin_emits_accepted_event() {\n        use soroban_sdk::testutils::Events as _;\n        use soroban_sdk::{IntoVal, Symbol};\n\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.set_admin(\u0026admin, \u0026new_admin);\n        client.accept_admin();\n\n        let events = env.events().all();\n        let acc_ev = events\n            .iter()\n            .find(|e| {\n                !e.1.is_empty() \u0026\u0026 {\n                    let t: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n                    t == Symbol::new(\u0026env, \"admin_accepted\")\n                }\n            })\n            .expect(\"expected admin_accepted event\");\n\n        let topic_old: Address = acc_ev.1.get(1).unwrap().into_val(\u0026env);\n        let topic_new: Address = acc_ev.1.get(2).unwrap().into_val(\u0026env);\n        assert_eq!(topic_old, admin);\n        assert_eq!(topic_new, new_admin);\n    }\n\n    // â”€â”€ panic / error paths â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€\n\n    #[test]\n    #[should_panic(expected = \"settlement contract already initialized\")]\n    fn test_double_init_panics() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n        client.init(\u0026admin, \u0026vault);\n    }\n\n    #[test]\n    #[should_panic(expected = \"amount must be positive\")]\n    fn test_receive_payment_zero_amount() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u00260i128, \u0026true, \u0026None);\n    }\n\n    #[test]\n    #[should_panic(expected = \"amount must be positive\")]\n    fn test_receive_payment_negative_amount() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u0026-1i128, \u0026true, \u0026None);\n    }\n\n    #[test]\n    #[should_panic(expected = \"developer address required when to_pool=false\")]\n    fn test_receive_payment_pool_false_no_developer() {\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u0026100i128, \u0026false, \u0026None);\n    }\n\n    #[test]\n    fn test_receive_payment_authorization_matrix() {\n        enum CallerRole {\n            Vault,\n            Admin,\n            ThirdParty,\n        }\n\n        struct Case {\n            name: \u0026'static str,\n            role: CallerRole,\n            expected: Result\u003c(), \u0026'static str\u003e,\n        }\n\n        let cases = [\n            Case {\n                name: \"vault address succeeds\",\n                role: CallerRole::Vault,\n                expected: Ok(()),\n            },\n            Case {\n                name: \"admin address succeeds\",\n                role: CallerRole::Admin,\n                expected: Ok(()),\n            },\n            Case {\n                name: \"third party fails\",\n                role: CallerRole::ThirdParty,\n                expected: Err(\"unauthorized: caller must be vault or admin\"),\n            },\n        ];\n\n        for case in cases {\n            let (env, addr, admin, vault, third_party) = setup_contract();\n            let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n            let caller = match case.role {\n                CallerRole::Vault =\u003e vault,\n                CallerRole::Admin =\u003e admin,\n                CallerRole::ThirdParty =\u003e third_party,\n            };\n\n            let result = catch_unwind(AssertUnwindSafe(|| {\n                client.receive_payment(\u0026caller, \u0026100i128, \u0026true, \u0026None);\n            }));\n\n            match case.expected {\n                Ok(()) =\u003e {\n                    assert!(result.is_ok(), \"expected success for case: {}\", case.name);\n                    let global_pool = client.get_global_pool();\n                    assert_eq!(global_pool.total_balance, 100i128);\n                }\n                Err(expected_panic) =\u003e {\n                    let err = result.expect_err(\"expected panic but call succeeded\");\n                    let message = panic_message(err);\n                    assert!(\n                        message.contains(expected_panic),\n                        \"case: {} (got panic: {})\",\n                        case.name,\n                        message\n                    );\n                }\n            }\n        }\n    }\n\n    // â”€â”€ event shape tests â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€\n\n    #[test]\n    fn test_payment_received_event_to_pool() {\n        use soroban_sdk::testutils::Events as _;\n        use soroban_sdk::{IntoVal, Symbol};\n\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u00261000i128, \u0026true, \u0026None);\n\n        let events = env.events().all();\n        let ev = events\n            .iter()\n            .find(|e| {\n                !e.1.is_empty() \u0026\u0026 {\n                    let t: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n                    t == Symbol::new(\u0026env, \"payment_received\")\n                }\n            })\n            .expect(\"expected payment_received event\");\n\n        let topic1: Address = ev.1.get(1).unwrap().into_val(\u0026env);\n        assert_eq!(topic1, vault);\n\n        let data: crate::PaymentReceivedEvent = ev.2.into_val(\u0026env);\n        assert_eq!(data.from_vault, vault);\n        assert_eq!(data.amount, 1000i128);\n        assert!(data.to_pool);\n        assert!(data.developer.is_none());\n    }\n\n    #[test]\n    fn test_payment_received_and_balance_credited_events_to_developer() {\n        use soroban_sdk::testutils::Events as _;\n        use soroban_sdk::{IntoVal, Symbol};\n\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u0026500i128, \u0026false, \u0026Some(developer.clone()));\n\n        let events = env.events().all();\n\n        let pr_ev = events\n            .iter()\n            .find(|e| {\n                !e.1.is_empty() \u0026\u0026 {\n                    let t: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n                    t == Symbol::new(\u0026env, \"payment_received\")\n                }\n            })\n            .expect(\"expected payment_received event\");\n\n        let pr_data: crate::PaymentReceivedEvent = pr_ev.2.into_val(\u0026env);\n        assert!(!pr_data.to_pool);\n        assert_eq!(pr_data.developer, Some(developer.clone()));\n\n        let bc_ev = events\n            .iter()\n            .find(|e| {\n                !e.1.is_empty() \u0026\u0026 {\n                    let t: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n                    t == Symbol::new(\u0026env, \"balance_credited\")\n                }\n            })\n            .expect(\"expected balance_credited event\");\n\n        let topic1: Address = bc_ev.1.get(1).unwrap().into_val(\u0026env);\n        assert_eq!(topic1, developer);\n\n        let bc_data: crate::BalanceCreditedEvent = bc_ev.2.into_val(\u0026env);\n        assert_eq!(bc_data.developer, developer);\n        assert_eq!(bc_data.amount, 500i128);\n        assert_eq!(bc_data.new_balance, 500i128);\n    }\n\n    #[test]\n    fn test_balance_credited_new_balance_is_cumulative() {\n        use soroban_sdk::testutils::Events as _;\n        use soroban_sdk::{IntoVal, Symbol};\n\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        client.receive_payment(\u0026vault, \u0026300i128, \u0026false, \u0026Some(developer.clone()));\n        client.receive_payment(\u0026vault, \u0026200i128, \u0026false, \u0026Some(developer.clone()));\n\n        // grab the last balance_credited event\n        let events = env.events().all();\n        let bc_ev = events\n            .iter()\n            .rev()\n            .find(|e| {\n                !e.1.is_empty() \u0026\u0026 {\n                    let t: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n                    t == Symbol::new(\u0026env, \"balance_credited\")\n                }\n            })\n            .expect(\"expected balance_credited event\");\n\n        let bc_data: crate::BalanceCreditedEvent = bc_ev.2.into_val(\u0026env);\n        assert_eq!(bc_data.new_balance, 500i128);\n    }\n\n    // â”€â”€ regression tests: ensure settlement logic intact after rotation â”€â”€â”€â”€â”€\n\n    #[test]\n    fn test_receive_payment_works_after_admin_rotation() {\n        // Ensure payment processing still works after admin change\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        // Rotate admin\n        client.set_admin(\u0026admin, \u0026new_admin);\n        client.accept_admin();\n\n        // Vault can still send payments\n        client.receive_payment(\u0026vault, \u00261000i128, \u0026true, \u0026None);\n        assert_eq!(client.get_global_pool().total_balance, 1000i128);\n    }\n\n    #[test]\n    fn test_receive_payment_works_after_vault_update() {\n        // Ensure payment processing works with new vault address\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        // Update vault\n        client.set_vault(\u0026admin, \u0026new_vault);\n\n        // Old vault cannot send payments\n        let result = catch_unwind(AssertUnwindSafe(|| {\n            client.receive_payment(\u0026vault, \u00261000i128, \u0026true, \u0026None);\n        }));\n        assert!(result.is_err());\n        assert!(panic_message(result.unwrap_err()).contains(\"unauthorized\"));\n\n        // New vault can send payments\n        client.receive_payment(\u0026new_vault, \u00261000i128, \u0026true, \u0026None);\n        assert_eq!(client.get_global_pool().total_balance, 1000i128);\n    }\n\n    #[test]\n    fn test_developer_withdrawal_after_admin_rotation() {\n        // Ensure developer balances accessible after admin change\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        // Credit developer\n        client.receive_payment(\u0026vault, \u0026500i128, \u0026false, \u0026Some(developer.clone()));\n\n        // Rotate admin\n        client.set_admin(\u0026admin, \u0026new_admin);\n        client.accept_admin();\n\n        // Balance still accessible\n        assert_eq!(client.get_developer_balance(\u0026developer), 500i128);\n\n        // Admin can still view all balances\n        let all_balances = client.get_all_developer_balances();\n        assert_eq!(all_balances.len(), 1);\n        assert_eq!(all_balances.get(0).unwrap().balance, 500i128);\n    }\n\n    #[test]\n    fn test_multiple_payments_accumulate_after_vault_update() {\n        // Ensure accumulation logic works correctly after vault changes\n        let env = Env::default();\n        env.mock_all_auths();\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        // Some payments from old vault\n        client.receive_payment(\u0026vault, \u0026100i128, \u0026false, \u0026Some(developer.clone()));\n\n        // Update vault\n        client.set_vault(\u0026admin, \u0026new_vault);\n\n        // More payments from new vault\n        client.receive_payment(\u0026new_vault, \u0026150i128, \u0026false, \u0026Some(developer.clone()));\n        client.receive_payment(\u0026new_vault, \u0026200i128, \u0026false, \u0026Some(developer.clone()));\n\n        // Total should accumulate correctly\n        assert_eq!(client.get_developer_balance(\u0026developer), 450i128);\n    }\n\n    #[test]\n    fn test_global_pool_timestamp_updates_after_admin_change() {\n        // Ensure pool timestamp updates correctly regardless of admin\n        let env = Env::default();\n        env.mock_all_auths();\n        env.ledger().set_timestamp(1_700_000_000);\n\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let new_admin = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n        client.init(\u0026admin, \u0026vault);\n\n        // Initial payment\n        client.receive_payment(\u0026vault, \u00261000i128, \u0026true, \u0026None);\n        let pool_before = client.get_global_pool();\n        assert_eq!(pool_before.last_updated, 1_700_000_000);\n\n        // Rotate admin and advance time\n        client.set_admin(\u0026admin, \u0026new_admin);\n        client.accept_admin();\n        env.ledger().set_timestamp(1_700_000_100);\n\n        // New payment updates timestamp\n        client.receive_payment(\u0026vault, \u0026500i128, \u0026true, \u0026None);\n        let pool_after = client.get_global_pool();\n        assert_eq!(pool_after.last_updated, 1_700_000_100);\n        assert_eq!(pool_after.total_balance, 1500i128);\n    }\n\n    /// `last_updated` reflects the ledger timestamp at the moment of each pool credit.\n    #[test]\n    fn test_global_pool_last_updated_on_receive_payment() {\n        let env = Env::default();\n        env.mock_all_auths();\n\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n\n        env.ledger().set_timestamp(1_000);\n        client.init(\u0026admin, \u0026vault);\n        assert_eq!(client.get_global_pool().last_updated, 1_000);\n\n        // Advance time and credit pool ï¿½ last_updated must change\n        env.ledger().set_timestamp(2_000);\n        client.receive_payment(\u0026vault, \u0026100i128, \u0026true, \u0026None);\n        let pool = client.get_global_pool();\n        assert_eq!(pool.last_updated, 2_000);\n        assert_eq!(pool.total_balance, 100i128);\n\n        // Advance again ï¿½ each credit stamps the new time\n        env.ledger().set_timestamp(3_000);\n        client.receive_payment(\u0026vault, \u002650i128, \u0026true, \u0026None);\n        let pool2 = client.get_global_pool();\n        assert_eq!(pool2.last_updated, 3_000);\n        assert_eq!(pool2.total_balance, 150i128);\n    }\n\n    /// Routing to a developer does NOT update `last_updated` on the global pool.\n    #[test]\n    fn test_global_pool_last_updated_unchanged_for_developer_payment() {\n        let env = Env::default();\n        env.mock_all_auths();\n\n        let admin = Address::generate(\u0026env);\n        let vault = Address::generate(\u0026env);\n        let developer = Address::generate(\u0026env);\n        let addr = env.register(CalloraSettlement, ());\n        let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n\n        env.ledger().set_timestamp(1_000);\n        client.init(\u0026admin, \u0026vault);\n\n        env.ledger().set_timestamp(5_000);\n        client.receive_payment(\u0026vault, \u0026200i128, \u0026false, \u0026Some(developer.clone()));\n\n        // Pool timestamp must still be the init timestamp\n        assert_eq!(client.get_global_pool().last_updated, 1_000);\n        assert_eq!(client.get_global_pool().total_balance, 0);\n        assert_eq!(client.get_developer_balance(\u0026developer), 200i128);\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","chukwuemekadr","Documents","Drips","Wave4","Callora-Contracts","contracts","settlement","src","test_views.rs"],"content":"use crate::{CalloraSettlement, CalloraSettlementClient};\nuse soroban_sdk::{testutils::Address as _, Address, Env};\n\n#[test]\n#[should_panic(expected = \"settlement contract not initialized\")]\nfn test_get_admin_uninitialized_panics() {\n    let env = Env::default();\n    let addr = env.register(CalloraSettlement, ());\n    let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n\n    client.get_admin();\n}\n\n#[test]\n#[should_panic(expected = \"settlement contract not initialized\")]\nfn test_get_vault_uninitialized_panics() {\n    let env = Env::default();\n    let addr = env.register(CalloraSettlement, ());\n    let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n\n    client.get_vault();\n}\n\n#[test]\n#[should_panic(expected = \"settlement contract not initialized\")]\nfn test_get_global_pool_uninitialized_panics() {\n    let env = Env::default();\n    let addr = env.register(CalloraSettlement, ());\n    let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n\n    client.get_global_pool();\n}\n\n#[test]\n#[should_panic(expected = \"settlement contract not initialized\")]\nfn test_get_developer_balance_uninitialized_panics() {\n    let env = Env::default();\n    let dev = Address::generate(\u0026env);\n    let addr = env.register(CalloraSettlement, ());\n    let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n\n    client.get_developer_balance(\u0026dev);\n}\n\n#[test]\n#[should_panic(expected = \"settlement contract not initialized\")]\nfn test_get_all_developer_balances_uninitialized_panics() {\n    let env = Env::default();\n    let addr = env.register(CalloraSettlement, ());\n    let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n\n    client.get_all_developer_balances();\n}\n\n#[test]\nfn test_get_developer_balance_returns_zero_when_not_stored() {\n    let env = Env::default();\n    env.mock_all_auths();\n\n    let admin = Address::generate(\u0026env);\n    let vault = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n\n    let addr = env.register(CalloraSettlement, ());\n    let client = CalloraSettlementClient::new(\u0026env, \u0026addr);\n\n    client.init(\u0026admin, \u0026vault);\n\n    let balance = client.get_developer_balance(\u0026dev);\n    assert_eq!(balance, 0);\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","chukwuemekadr","Documents","Drips","Wave4","Callora-Contracts","contracts","vault","src","lib.rs"],"content":"//! # Callora Vault Contract  deposit/withdraw/deduct/distribute with pause circuit-breaker.\n#![no_std]\nuse soroban_sdk::{contract, contractimpl, contracttype, token, Address, Env, String, Symbol, Vec};\n\n#[contracttype]\n#[derive(Clone)]\npub struct DeductItem {\n    pub amount: i128,\n    pub request_id: Option\u003cSymbol\u003e,\n}\n\n#[contracttype]\n#[derive(Clone)]\npub struct VaultMeta {\n    pub owner: Address,\n    pub balance: i128,\n    pub authorized_caller: Option\u003cAddress\u003e,\n    pub min_deposit: i128,\n}\n\n#[contracttype]\npub enum StorageKey {\n    Meta,\n    AllowedDepositors,\n    Admin,\n    UsdcToken,\n    Settlement,\n    RevenuePool,\n    MaxDeduct,\n    Paused,\n    Metadata(String),\n    PendingOwner,\n    PendingAdmin,\n    DepositorList,\n}\n\npub const DEFAULT_MAX_DEDUCT: i128 = i128::MAX;\npub const MAX_BATCH_SIZE: u32 = 50;\npub const MAX_METADATA_LEN: u32 = 256;\npub const MAX_OFFERING_ID_LEN: u32 = 64;\n\n#[contract]\npub struct CalloraVault;\n\n#[contractimpl]\nimpl CalloraVault {\n    #[allow(clippy::too_many_arguments)]\n    pub fn init(\n        env: Env,\n        owner: Address,\n        usdc_token: Address,\n        initial_balance: Option\u003ci128\u003e,\n        authorized_caller: Option\u003cAddress\u003e,\n        min_deposit: Option\u003ci128\u003e,\n        revenue_pool: Option\u003cAddress\u003e,\n        max_deduct: Option\u003ci128\u003e,\n    ) -\u003e VaultMeta {\n        owner.require_auth();\n        let inst = env.storage().instance();\n        if inst.has(\u0026StorageKey::Meta) {\n            panic!(\"vault already initialized\");\n        }\n        assert!(\n            usdc_token != env.current_contract_address(),\n            \"usdc_token cannot be vault address\"\n        );\n        if let Some(p) = \u0026revenue_pool {\n            assert!(\n                p != \u0026env.current_contract_address(),\n                \"revenue_pool cannot be vault address\"\n            );\n        }\n        let balance = initial_balance.unwrap_or(0);\n        assert!(balance \u003e= 0, \"initial balance must be non-negative\");\n        let min_d = min_deposit.unwrap_or(0);\n        assert!(min_d \u003e= 0, \"min_deposit must be non-negative\");\n        let max_d = max_deduct.unwrap_or(DEFAULT_MAX_DEDUCT);\n        assert!(max_d \u003e 0, \"max_deduct must be positive\");\n        assert!(min_d \u003c= max_d, \"min_deposit cannot exceed max_deduct\");\n        if balance \u003e 0 {\n            let onchain_usdc_balance =\n                token::Client::new(\u0026env, \u0026usdc_token).balance(\u0026env.current_contract_address());\n            assert!(\n                onchain_usdc_balance \u003e= balance,\n                \"initial_balance exceeds on-ledger USDC balance\"\n            );\n        }\n        let meta = VaultMeta {\n            owner: owner.clone(),\n            balance,\n            authorized_caller,\n            min_deposit: min_d,\n        };\n        inst.set(\u0026StorageKey::Meta, \u0026meta);\n        inst.set(\u0026StorageKey::UsdcToken, \u0026usdc_token);\n        inst.set(\u0026StorageKey::Admin, \u0026owner);\n        if let Some(p) = revenue_pool {\n            inst.set(\u0026StorageKey::RevenuePool, \u0026p);\n        }\n        inst.set(\u0026StorageKey::MaxDeduct, \u0026max_d);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"init\"), owner.clone()), balance);\n        meta\n    }\n\n    pub fn is_authorized_depositor(env: Env, caller: Address) -\u003e bool {\n        let meta = Self::get_meta(env.clone());\n        if caller == meta.owner {\n            return true;\n        }\n        let list: Vec\u003cAddress\u003e = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::DepositorList)\n            .unwrap_or(Vec::new(\u0026env));\n        list.contains(\u0026caller)\n    }\n\n    pub fn get_admin(env: Env) -\u003e Address {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Admin)\n            .expect(\"vault not initialized\")\n    }\n\n    pub fn set_admin(env: Env, caller: Address, new_admin: Address) {\n        caller.require_auth();\n        let cur = Self::get_admin(env.clone());\n        if caller != cur {\n            panic!(\"unauthorized: caller is not admin\");\n        }\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::PendingAdmin, \u0026new_admin);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"admin_nominated\"), cur, new_admin), ());\n    }\n\n    pub fn accept_admin(env: Env) {\n        let pending: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::PendingAdmin)\n            .expect(\"no admin transfer pending\");\n        pending.require_auth();\n        let cur = Self::get_admin(env.clone());\n        env.storage().instance().set(\u0026StorageKey::Admin, \u0026pending);\n        env.storage().instance().remove(\u0026StorageKey::PendingAdmin);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"admin_accepted\"), cur, pending), ());\n    }\n\n    pub fn require_owner(env: Env, caller: Address) {\n        let meta = Self::get_meta(env.clone());\n        assert!(caller == meta.owner, \"unauthorized: owner only\");\n    }\n\n    pub fn distribute(env: Env, caller: Address, to: Address, amount: i128) {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone());\n        if caller != admin {\n            panic!(\"unauthorized: caller is not admin\");\n        }\n        if amount \u003c= 0 {\n            panic!(\"amount must be positive\");\n        }\n        let usdc_addr: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .expect(\"vault not initialized\");\n        let usdc = token::Client::new(\u0026env, \u0026usdc_addr);\n        let vb = usdc.balance(\u0026env.current_contract_address());\n        if vb \u003c amount {\n            panic!(\"insufficient USDC balance\");\n        }\n        usdc.transfer(\u0026env.current_contract_address(), \u0026to, \u0026amount);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"distribute\"), to), amount);\n    }\n\n    pub fn get_meta(env: Env) -\u003e VaultMeta {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Meta)\n            .unwrap_or_else(|| panic!(\"vault not initialized\"))\n    }\n\n    pub fn set_allowed_depositor(env: Env, caller: Address, depositor: Option\u003cAddress\u003e) {\n        caller.require_auth();\n        Self::require_owner(env.clone(), caller);\n        match depositor {\n            Some(d) =\u003e {\n                let mut list: Vec\u003cAddress\u003e = env\n                    .storage()\n                    .instance()\n                    .get(\u0026StorageKey::DepositorList)\n                    .unwrap_or(Vec::new(\u0026env));\n                if !list.contains(\u0026d) {\n                    env.storage()\n                        .instance()\n                        .set(\u0026StorageKey::AllowedDepositors, \u0026d);\n                    list.push_back(d);\n                }\n                env.storage()\n                    .instance()\n                    .set(\u0026StorageKey::DepositorList, \u0026list);\n            }\n            None =\u003e {\n                env.storage()\n                    .instance()\n                    .remove(\u0026StorageKey::AllowedDepositors);\n                env.storage()\n                    .instance()\n                    .set(\u0026StorageKey::DepositorList, \u0026Vec::\u003cAddress\u003e::new(\u0026env));\n            }\n        }\n    }\n\n    pub fn clear_allowed_depositors(env: Env, caller: Address) {\n        caller.require_auth();\n        Self::require_owner(env.clone(), caller);\n        env.storage()\n            .instance()\n            .remove(\u0026StorageKey::AllowedDepositors);\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::DepositorList, \u0026Vec::\u003cAddress\u003e::new(\u0026env));\n    }\n\n    pub fn get_allowed_depositors(env: Env) -\u003e Vec\u003cAddress\u003e {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::DepositorList)\n            .unwrap_or(Vec::new(\u0026env))\n    }\n\n    pub fn set_authorized_caller(env: Env, caller: Address) {\n        let mut meta = Self::get_meta(env.clone());\n        meta.owner.require_auth();\n        meta.authorized_caller = Some(caller.clone());\n        env.storage().instance().set(\u0026StorageKey::Meta, \u0026meta);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"set_auth_caller\"), meta.owner.clone()),\n            caller,\n        );\n    }\n\n    pub fn pause(env: Env, caller: Address) {\n        caller.require_auth();\n        Self::require_admin_or_owner(env.clone(), \u0026caller);\n        assert!(!Self::is_paused(env.clone()), \"vault already paused\");\n        env.storage().instance().set(\u0026StorageKey::Paused, \u0026true);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"vault_paused\"), caller), ());\n    }\n\n    pub fn unpause(env: Env, caller: Address) {\n        caller.require_auth();\n        Self::require_admin_or_owner(env.clone(), \u0026caller);\n        assert!(Self::is_paused(env.clone()), \"vault not paused\");\n        env.storage().instance().set(\u0026StorageKey::Paused, \u0026false);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"vault_unpaused\"), caller), ());\n    }\n\n    /// Returns the current pause state of the vault.\n    ///\n    /// # Purpose\n    /// Exposes the pause circuit-breaker state to enable off-chain indexers,\n    /// monitoring systems, and external contracts to query whether the vault\n    /// is currently paused. This allows reliable tracking of contract availability\n    /// for deposit, deduct, and batch_deduct operations.\n    ///\n    /// # Return Value\n    /// Returns `true` if the vault is currently paused, `false` otherwise.\n    /// Before the first `pause()` call, this function returns `false` (the safe\n    /// default state), ensuring that uninitialized pause state does not block\n    /// legitimate operations.\n    ///\n    /// # Safety Guarantees\n    /// - **Read-only**: This function performs no state mutation or side effects.\n    /// - **Deterministic**: Identical storage state always produces identical output.\n    /// - **Non-panicking**: Never panics, even before initialization or when pause\n    ///   state is unset. Returns `false` as the safe default.\n    /// - **Consistent**: Always reflects the latest committed pause/unpause state\n    ///   from contract storage, never stale or cached values.\n    ///\n    /// # Indexer Usage\n    /// Safe for external indexers and off-chain monitoring systems. Call this\n    /// function to determine whether the vault is accepting deposits and processing\n    /// deductions. When `is_paused()` returns `true`, the following operations are\n    /// blocked:\n    /// - `deposit()`\n    /// - `deduct()`\n    /// - `batch_deduct()`\n    ///\n    /// The pause state is consistent with emitted events:\n    /// - `vault_paused` event → `is_paused()` returns `true`\n    /// - `vault_unpaused` event → `is_paused()` returns `false`\n    ///\n    /// # Example\n    /// ```ignore\n    /// if vault.is_paused() {\n    ///     // Vault is paused - deposits and deductions are blocked\n    ///     // Only admin/owner operations like withdraw() are allowed\n    /// } else {\n    ///     // Vault is operational - all functions available\n    /// }\n    /// ```\n    pub fn is_paused(env: Env) -\u003e bool {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Paused)\n            .unwrap_or(false)\n    }\n\n    pub fn get_max_deduct(env: Env) -\u003e i128 {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::MaxDeduct)\n            .unwrap_or(DEFAULT_MAX_DEDUCT)\n    }\n\n    pub fn deposit(env: Env, caller: Address, amount: i128) -\u003e i128 {\n        caller.require_auth();\n        Self::require_not_paused(env.clone());\n        assert!(amount \u003e 0, \"amount must be positive\");\n        assert!(\n            Self::is_authorized_depositor(env.clone(), caller.clone()),\n            \"unauthorized: only owner or allowed depositor can deposit\"\n        );\n        let meta = Self::get_meta(env.clone());\n        assert!(\n            amount \u003e= meta.min_deposit,\n            \"deposit below minimum: {} \u003c {}\",\n            amount,\n            meta.min_deposit\n        );\n        let usdc_addr: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .expect(\"vault not initialized\");\n        let usdc = token::Client::new(\u0026env, \u0026usdc_addr);\n        usdc.transfer(\u0026caller, \u0026env.current_contract_address(), \u0026amount);\n        let mut meta = Self::get_meta(env.clone());\n        meta.balance = meta\n            .balance\n            .checked_add(amount)\n            .unwrap_or_else(|| panic!(\"balance overflow\"));\n        env.storage().instance().set(\u0026StorageKey::Meta, \u0026meta);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"deposit\"), caller.clone()),\n            (amount, meta.balance),\n        );\n        meta.balance\n    }\n\n    pub fn deduct(env: Env, caller: Address, amount: i128, request_id: Option\u003cSymbol\u003e) -\u003e i128 {\n        caller.require_auth();\n        Self::require_not_paused(env.clone());\n        Self::require_routing_configured(env.clone());\n        assert!(amount \u003e 0, \"amount must be positive\");\n        let max_d = Self::get_max_deduct(env.clone());\n        assert!(amount \u003c= max_d, \"deduct amount exceeds max_deduct\");\n        let meta = Self::get_meta(env.clone());\n        let auth = match \u0026meta.authorized_caller {\n            Some(ac) =\u003e caller == *ac || caller == meta.owner,\n            None =\u003e true,\n        };\n        assert!(auth, \"unauthorized caller\");\n        assert!(meta.balance \u003e= amount, \"insufficient balance\");\n        let mut meta = Self::get_meta(env.clone());\n        meta.balance = meta.balance.checked_sub(amount).unwrap();\n        env.storage().instance().set(\u0026StorageKey::Meta, \u0026meta);\n        let inst = env.storage().instance();\n        if let Some(s) = inst.get::\u003cStorageKey, Address\u003e(\u0026StorageKey::Settlement) {\n            let ut: Address = inst.get(\u0026StorageKey::UsdcToken).unwrap();\n            Self::transfer_funds(\u0026env, \u0026ut, \u0026s, amount);\n        } else if inst\n            .get::\u003cStorageKey, Address\u003e(\u0026StorageKey::RevenuePool)\n            .is_some()\n        {\n            Self::transfer_to_revenue_pool(env.clone(), amount);\n        }\n        let rid = request_id.unwrap_or(Symbol::new(\u0026env, \"\"));\n        env.events().publish(\n            (Symbol::new(\u0026env, \"deduct\"), caller, rid),\n            (amount, meta.balance),\n        );\n        meta.balance\n    }\n\n    pub fn batch_deduct(env: Env, caller: Address, items: Vec\u003cDeductItem\u003e) -\u003e i128 {\n        caller.require_auth();\n        Self::require_not_paused(env.clone());\n        Self::require_routing_configured(env.clone());\n        let n = items.len();\n        assert!(n \u003e 0, \"batch_deduct requires at least one item\");\n        assert!(n \u003c= MAX_BATCH_SIZE, \"batch too large\");\n        let max_d = Self::get_max_deduct(env.clone());\n        let mut meta = Self::get_meta(env.clone());\n        let auth = match \u0026meta.authorized_caller {\n            Some(ac) =\u003e caller == *ac || caller == meta.owner,\n            None =\u003e true,\n        };\n        assert!(auth, \"unauthorized caller\");\n        let mut running = meta.balance;\n        let mut total: i128 = 0;\n        for item in items.iter() {\n            assert!(item.amount \u003e 0, \"amount must be positive\");\n            assert!(item.amount \u003c= max_d, \"deduct amount exceeds max_deduct\");\n            assert!(running \u003e= item.amount, \"insufficient balance\");\n            running = running.checked_sub(item.amount).unwrap();\n            total = total.checked_add(item.amount).unwrap();\n        }\n        meta.balance = running;\n        env.storage().instance().set(\u0026StorageKey::Meta, \u0026meta);\n        let mut eb = meta.balance.checked_add(total).unwrap();\n        for item in items.iter() {\n            eb = eb.checked_sub(item.amount).unwrap();\n            let rid = item.request_id.clone().unwrap_or(Symbol::new(\u0026env, \"\"));\n            env.events().publish(\n                (Symbol::new(\u0026env, \"deduct\"), caller.clone(), rid),\n                (item.amount, eb),\n            );\n        }\n        let inst = env.storage().instance();\n        if let Some(s) = inst.get::\u003cStorageKey, Address\u003e(\u0026StorageKey::Settlement) {\n            let ut: Address = inst.get(\u0026StorageKey::UsdcToken).unwrap();\n            Self::transfer_funds(\u0026env, \u0026ut, \u0026s, total);\n        } else if inst\n            .get::\u003cStorageKey, Address\u003e(\u0026StorageKey::RevenuePool)\n            .is_some()\n        {\n            Self::transfer_to_revenue_pool(env.clone(), total);\n        }\n        meta.balance\n    }\n\n    pub fn balance(env: Env) -\u003e i128 {\n        Self::get_meta(env).balance\n    }\n\n    pub fn transfer_ownership(env: Env, new_owner: Address) {\n        let meta = Self::get_meta(env.clone());\n        meta.owner.require_auth();\n        assert!(\n            new_owner != meta.owner,\n            \"new_owner must be different from current owner\"\n        );\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::PendingOwner, \u0026new_owner);\n        env.events().publish(\n            (\n                Symbol::new(\u0026env, \"ownership_nominated\"),\n                meta.owner,\n                new_owner,\n            ),\n            (),\n        );\n    }\n\n    pub fn accept_ownership(env: Env) {\n        let pending: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::PendingOwner)\n            .expect(\"no ownership transfer pending\");\n        pending.require_auth();\n        let mut meta = Self::get_meta(env.clone());\n        let old = meta.owner.clone();\n        meta.owner = pending;\n        env.storage().instance().set(\u0026StorageKey::Meta, \u0026meta);\n        env.storage().instance().remove(\u0026StorageKey::PendingOwner);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"ownership_accepted\"), old, meta.owner),\n            (),\n        );\n    }\n\n    pub fn withdraw(env: Env, amount: i128) -\u003e i128 {\n        let mut meta = Self::get_meta(env.clone());\n        meta.owner.require_auth();\n        assert!(amount \u003e 0, \"amount must be positive\");\n        assert!(meta.balance \u003e= amount, \"insufficient balance\");\n        let ua: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .expect(\"vault not initialized\");\n        let usdc = token::Client::new(\u0026env, \u0026ua);\n        usdc.transfer(\u0026env.current_contract_address(), \u0026meta.owner, \u0026amount);\n        meta.balance = meta.balance.checked_sub(amount).unwrap();\n        env.storage().instance().set(\u0026StorageKey::Meta, \u0026meta);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"withdraw\"), meta.owner.clone()),\n            (amount, meta.balance),\n        );\n        meta.balance\n    }\n\n    pub fn withdraw_to(env: Env, to: Address, amount: i128) -\u003e i128 {\n        let mut meta = Self::get_meta(env.clone());\n        meta.owner.require_auth();\n        assert!(amount \u003e 0, \"amount must be positive\");\n        assert!(meta.balance \u003e= amount, \"insufficient balance\");\n        let ua: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .expect(\"vault not initialized\");\n        let usdc = token::Client::new(\u0026env, \u0026ua);\n        usdc.transfer(\u0026env.current_contract_address(), \u0026to, \u0026amount);\n        meta.balance = meta.balance.checked_sub(amount).unwrap();\n        env.storage().instance().set(\u0026StorageKey::Meta, \u0026meta);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"withdraw_to\"), meta.owner.clone(), to),\n            (amount, meta.balance),\n        );\n        meta.balance\n    }\n\n    /// Sets or clears the revenue pool routing address.\n    ///\n    /// # Purpose\n    /// Configures where USDC is routed during deduct operations when no settlement\n    /// address is configured. The revenue pool serves as the fallback routing destination.\n    ///\n    /// # Validation\n    /// - Caller must be admin\n    /// - Revenue pool address cannot be the vault's own address\n    /// - Setting to `None` clears the configuration\n    ///\n    /// # Safety Guarantees\n    /// - Atomic update: state is either fully updated or unchanged\n    /// - Emits event for audit trail (`set_revenue_pool` or `clear_revenue_pool`)\n    /// - Prevents self-referential routing (vault → vault)\n    ///\n    /// # Routing Behavior\n    /// - If both settlement and revenue_pool are set, settlement takes priority\n    /// - If only revenue_pool is set, all deducts route to revenue_pool\ diate values.\n    /// - **Deterministic**: Identical state inputs always produce identical outputs.\n    /// - **Non-panicking**: Returns `None` gracefully when revenue pool is not configured.\n    ///\n    /// # Indexer Usage\n    /// Safe for external indexers and off-chain queries. Call this function to\n    /// determine the active revenue pool routing destination. Note that if both\n    /// settlement and revenue pool are configured, settlement takes priority for\n    /// fund routing during `deduct()` and `batch_deduct()` operations.\n    ///\n    /// # Example\n    /// ```ignore\n    /// match vault.get_revenue_pool() {\n    ///     Some(pool_addr) =\u003e { /* revenue pool is configured */ }\n    ///     None =\u003e { /* no revenue pool configured */ }\n    /// }\n    /// ```\n    pub fn get_revenue_pool(env: Env) -\u003e Option\u003cAddress\u003e {\n        env.storage().instance().get(\u0026StorageKey::RevenuePool)\n    }\n\n    /// Sets the settlement routing address.\n    ///\n    /// # Purpose\n    /// Configures the primary routing destination for USDC during deduct operations.\n    /// Settlement takes priority over revenue_pool when both are configured.\n    ///\n    /// # Validation\n    /// - Caller must be admin\n    /// - Settlement address cannot be the vault's own address\n    ///\n    /// # Safety Guarantees\n    /// - Atomic update: state is immediately committed\n    /// - Emits event for audit trail (`set_settlement`)\n    /// - Prevents self-referential routing (vault → vault)\n    ///\n    /// # Routing Priority\n    /// 1. If settlement is set → route to settlement (highest priority)\n    /// 2. Else if revenue_pool is set → route to revenue_pool\n    /// 3. Else → deduct operations fail with \"routing not configured\"\n    ///\n    /// # Events\n    /// - `set_settlement(caller) → address` when setting\n    pub fn set_settlement(env: Env, caller: Address, settlement_address: Address) {\n        caller.require_auth();\n        let admi
